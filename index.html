    <!-- Critical inline CSS for instant first paint -->
    <style>
      *,*::before,*::after{box-sizing:border-box;border-width:0;border-style:solid}
      html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:'Noto Sans',sans-serif;scroll-behavior:smooth}
      body{margin:0;line-height:inherit;background-color:hsl(37 47% 96%);color:hsl(160 65% 14%);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.7}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .safe-area-bottom{padding-bottom:env(safe-area-inset-bottom,0)}
      @keyframes spin{to{transform:rotate(360deg)}}
      .app-loader{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
      .app-loader-spinner{width:32px;height:32px;border:2px solid hsl(160 65% 14%/.2);border-top-color:hsl(160 65% 14%);border-radius:50%;animation:spin 1s linear infinite}
